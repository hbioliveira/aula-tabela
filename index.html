<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Tabelas</h1>

    <table>
<tr>
    <th>Roupa</th>
    <th>Cor</th>
    <th>Tamanho</th>
    <th>Preço</th>
    <th>Disponibilidade</th>
</tr>
<tr>
    <td>Camiseta</td>
    <td>Preta</td>
    <td>M</td>
    <td>R$ 70,00</td>
    <td>Em estoque</td>
</tr>
<tr>
    <td>Calça</td>
    <td>Jeans</td>
    <td>Azul</td>
    <td>R$ 160,00</td>
    <td>Esgotado</td>
</tr>
    </table>
<br>
<a href="https://developer.mozilla.org/pt-BR/docs/Web/HTML/Element/tfoot" target="_blank">Link com outras tags mais avançadas de tabela</a>

<p>Para criar as tags dessa tabela, todas de uma vez, basta digitar o comando: <br> <br><strong>table>(tr>th*5)>tr*2>td*5</strong></p>

</body>
</html>
